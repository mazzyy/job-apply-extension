<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Job Apply Assistant</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body>
  <div class="splash" id="splash">
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="jaaLogo" x1="4" y1="2" x2="36" y2="38" gradientUnits="userSpaceOnUse">
            <stop stop-color="#818cf8"/><stop offset="1" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="11" fill="url(#jaaLogo)"/>
        <rect width="40" height="40" rx="11" fill="#fff" fill-opacity="0.06"/>
        <path d="M10.5 20.5L17 27L29.5 12.5" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24 12.5H29.5V18" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Job Apply Assistant</h1>
    </div>
    <div class="status" id="status">
      <div class="spinner"></div>
      <div class="message" id="message">Starting backend…</div>
    </div>
    <div class="hint muted">First launch may take 5–10 seconds while we initialize the database.</div>
    <div id="error-panel" class="hidden">
      <div class="error-title">Could not start backend</div>
      <pre class="error-detail" id="error-detail"></pre>
      <button id="retry">Retry</button>
    </div>
  </div>
  <script type="module" src="shell.js"></script>
</body>
</html>
